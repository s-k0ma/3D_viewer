services:
  viewer-app:
    build: .
    container_name: qt_viewer_app
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
      XAUTHORITY: /tmp/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - $HOME/.Xauthority:/tmp/.Xauthority:ro
    stdin_open: true
    tty: true